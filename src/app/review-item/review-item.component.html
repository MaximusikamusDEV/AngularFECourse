<article class="review-item">
  <div class="review-item__header">
    <div>
      <h3 class="review-item__name">
        {{ review.name }}
      </h3>
    </div>

    <div class="review-item__rating">
      <fa-icon [icon]="faStarSolid">
      </fa-icon>

      <span>{{ review.rate }}</span>
    </div>
  </div>

  <p class="review-item__text">
    {{ review.text }}
  </p>
</article>
