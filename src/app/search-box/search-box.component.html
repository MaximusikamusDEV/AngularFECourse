<label class="search-box">
  <fa-icon [icon]="faMagnifyingGlass" class="search-box__icon"></fa-icon>
  <input
    #searchInput
    class="search-box__input"
    type="search"
    placeholder="Search products"
    aria-label="Search products"
    (keyup.enter)="onSearchQueryChange(searchInput.value)"
  >
</label>
